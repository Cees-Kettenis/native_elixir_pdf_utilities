<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <style>
      :root { --accent: #0f766e; --panel-pad: 6pt; }
      html, body { margin: 0; padding: 0; }
      body {
        font-family: "DejaVu Sans", Arial, sans-serif;
        font-size: 10pt;
        line-height: 12pt;
        color: #111827;
      }
      .sheet { width: 595pt; padding: 20pt; box-sizing: border-box; }
      * { box-sizing: border-box; }
      section.panel { width: 270pt; padding: var(--panel-pad); border: 1pt solid #334155; }
      section.panel > div { margin-top: 5pt; padding: 5pt; background-color: #e2e8f0; }
      section.panel .note { color: #991b1b; border-left: 3pt solid var(--accent); }
      section.panel > div:first-child { background-color: #dbeafe; }
      section.panel > div:last-child { background-color: #dcfce7; }
      section.panel > div:nth-child(2) { font-weight: 700; }
      #important { color: #1d4ed8 !important; }
      .hidden { display: none; }
    </style>
  </head>
  <body>
    <main class="sheet">
      <section class="panel">
        <div>first child rule</div>
        <div class="note" id="important">specific important note</div>
        <div class="hidden">this should not render</div>
        <div>last child rule</div>
      </section>
    </main>
  </body>
</html>
