<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <style>
      html, body { margin: 0; padding: 0; }
      body {
        font-family: "DejaVu Sans", Arial, sans-serif;
        font-size: 12pt;
        line-height: 14pt;
        color: #1f2933;
      }
      .sheet { width: 595pt; padding: 24pt; box-sizing: border-box; }
      .panel {
        width: 240pt;
        min-height: 72pt;
        margin: 12pt 0 18pt 16pt;
        padding: 10pt 14pt 12pt 8pt;
        border: 3pt solid #22344a;
        border-bottom-width: 6pt;
        border-left-color: #c2410c;
        background-color: #e8f1fb;
      }
      .inner {
        height: 24pt;
        padding: 4pt;
        border: 1pt solid #0f766e;
        background: #d1fae5;
        text-align: center;
      }
      .radius {
        width: 180pt;
        padding: 8pt;
        border: 2pt solid #6d28d9;
        border-radius: 5pt;
        background-color: #f5f3ff;
      }
    </style>
  </head>
  <body>
    <main class="sheet">
      <section class="panel">
        <div class="inner">box model</div>
      </section>
      <section class="radius">rounded border and background</section>
    </main>
  </body>
</html>
