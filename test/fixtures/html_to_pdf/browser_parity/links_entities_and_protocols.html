<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <style>
      html, body { margin: 0; padding: 0; }
      body {
        font-family: "DejaVu Sans", Arial, sans-serif;
        font-size: 10pt;
        line-height: 13pt;
        color: #111827;
      }
      .sheet { width: 612pt; padding: 24pt; box-sizing: border-box; }
      p {
        width: 330pt;
        margin: 0 0 10pt 0;
        padding: 6pt;
        border: 1pt solid #334155;
        background-color: #f8fafc;
      }
      a {
        color: #1d4ed8;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="sheet">
      <p>Named entities: &amp; &lt; &gt; &quot; &apos; &nbsp; &copy;</p>
      <p>Numeric entities: &#169; &#x2122; &#8364;</p>
      <p><a href="https://example.com/docs">HTTPS link</a></p>
      <p><a href="http://example.com/plain">HTTP link</a></p>
      <p><a href="mailto:test@example.com">Mail link</a></p>
    </main>
  </body>
</html>
