<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <style>
      html, body { margin: 0; padding: 0; }
      body {
        font-family: "DejaVu Sans", Arial, sans-serif;
        font-size: 11pt;
        line-height: 15pt;
        color: #1f2937;
      }
      .sheet { width: 595pt; padding: 24pt; box-sizing: border-box; }
      .copy {
        width: 180pt;
        padding: 8pt;
        border: 1pt solid #374151;
        background-color: #f9fafb;
        text-align: left;
        white-space: normal;
        overflow-wrap: break-word;
      }
      .copy strong { font-weight: 700; color: #991b1b; }
      .copy em { font-style: italic; color: #1d4ed8; }
      .upper { text-transform: uppercase; letter-spacing: 0; }
      .center { margin-top: 12pt; width: 180pt; text-align: center; border: 1pt solid #9ca3af; }
    </style>
  </head>
  <body>
    <main class="sheet">
      <p class="copy">
        Alpha <strong>bold words</strong> and <em>italic words</em> wrap across lines with
        SuperLongReferenceNumber1234567890 inside the same paragraph.<br>
        <span class="upper">second line</span>
      </p>
      <p class="center">center aligned text</p>
    </main>
  </body>
</html>
