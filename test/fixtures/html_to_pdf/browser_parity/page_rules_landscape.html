<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <style>
      @page { size: A4 landscape; margin: 0; }
      html, body { margin: 0; padding: 0; }
      .sheet {
        width: 841.89pt;
        height: 595.28pt;
        padding: 24pt;
        box-sizing: border-box;
        background-color: #ffffff;
      }
      .band {
        width: 360pt;
        height: 90pt;
        border: 4pt solid #1d4ed8;
        background-color: #dbeafe;
      }
      .marker {
        width: 160pt;
        height: 60pt;
        margin-top: 20pt;
        border: 3pt solid #047857;
        background-color: #d1fae5;
      }
    </style>
  </head>
  <body>
    <main class="sheet">
      <div class="band"></div>
      <div class="marker"></div>
    </main>
  </body>
</html>
