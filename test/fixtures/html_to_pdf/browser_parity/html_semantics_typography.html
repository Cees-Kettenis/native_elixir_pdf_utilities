<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="fixture" content="browser-parity">
    <title>Semantic Typography Fixture</title>
    <style>
      html, body { margin: 0; padding: 0; }
      body {
        font-family: "DejaVu Sans", Arial, sans-serif;
        font-size: 9pt;
        line-height: 11pt;
        color: #111827;
      }
      .sheet { width: 612pt; padding: 18pt; box-sizing: border-box; }
      header, nav, main, article, aside, footer, section {
        display: block;
        width: 420pt;
        margin-bottom: 7pt;
        padding: 5pt;
        border: 1pt solid #334155;
        background-color: #f8fafc;
      }
      nav { background-color: #e0f2fe; }
      aside { background-color: #fef3c7; }
      footer { background-color: #dcfce7; }
      h1, h2, h3, h4, h5, h6 {
        margin: 0 0 4pt 0;
        padding: 0;
        color: #1d4ed8;
      }
      h1 { font-size: 20pt; line-height: 22pt; }
      h2 { font-size: 17pt; line-height: 19pt; }
      h3 { font-size: 14pt; line-height: 16pt; }
      h4 { font-size: 12pt; line-height: 14pt; }
      h5 { font-size: 10pt; line-height: 12pt; }
      h6 { font-size: 9pt; line-height: 11pt; }
    </style>
  </head>
  <body>
    <main class="sheet">
      <header><h1>Heading One</h1><p>Header text with <b>bold alias</b>.</p></header>
      <nav><h2>Heading Two</h2><p>Navigation text</p></nav>
      <article><h3>Heading Three</h3><p>Article text with <i>italic alias</i>.</p></article>
      <aside><h4>Heading Four</h4><p>Aside text</p></aside>
      <section><h5>Heading Five</h5><p>Section text</p></section>
      <footer><h6>Heading Six</h6><p>Footer text</p></footer>
    </main>
  </body>
</html>
